name: 'vet — AI code health check'
description: 'Run @safetnsr/vet on your codebase and post a scorecard as a PR comment'
author: 'safetnsr'

branding:
  icon: 'shield'
  color: 'green'

inputs:
  threshold:
    description: 'Minimum score to pass (0-100). Default: 5.0'
    required: false
    default: '5.0'
  checks:
    description: 'Comma-separated list of specific checks to run'
    required: false
    default: ''
  working-directory:
    description: 'Directory to run vet in (relative to repo root)'
    required: false
    default: '.'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Run vet
      id: vet
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        VET_CHECKS: ${{ inputs.checks }}
        VET_THRESHOLD: ${{ inputs.threshold }}
      run: |
        # build command
        CMD="npx --yes @safetnsr/vet --ci --json"
        if [ -n "$VET_CHECKS" ]; then
          CMD="$CMD --checks $VET_CHECKS"
        fi

        # run vet, capture output regardless of exit code
        set +e
        OUTPUT=$($CMD 2>/dev/null)
        EXIT_CODE=$?
        set -e

        # parse json
        SCORE=$(echo "$OUTPUT" | jq -r '.score')
        GRADE=$(echo "$OUTPUT" | jq -r '.grade')
        TOTAL_ISSUES=$(echo "$OUTPUT" | jq -r '.totalIssues')
        FIXABLE=$(echo "$OUTPUT" | jq -r '.fixableIssues')

        # build category table rows
        CATEGORY_TABLE=$(echo "$OUTPUT" | jq -r '
          .categories[] |
          "| " + .name + " | " + (.weight * 100 | tostring) + "% | " + (.score | tostring) + "/100 | " + (.issues | length | tostring) + " |"
        ')

        # build top issues list (max 8)
        TOP_ISSUES=$(echo "$OUTPUT" | jq -r '
          [.categories[].issues[]] |
          sort_by(if .severity == "error" then 0 elif .severity == "warning" then 1 else 2 end) |
          .[0:8][] |
          "| `" + (.severity | ascii_upcase) + "` | " + (if .file then .file + (if .line then ":" + (.line | tostring) else "" end) else "—" end) + " | " + .message + " |"
        ')

        # determine pass/fail
        PASS="true"
        if (( $(echo "$SCORE < $VET_THRESHOLD" | bc -l) )); then
          PASS="false"
        fi

        # grade emoji
        case "$GRADE" in
          A) GRADE_ICON="🟢" ;;
          B) GRADE_ICON="🟢" ;;
          C) GRADE_ICON="🟡" ;;
          D) GRADE_ICON="🟠" ;;
          *) GRADE_ICON="🔴" ;;
        esac

        # set outputs
        {
          echo "score=$SCORE"
          echo "grade=$GRADE"
          echo "grade-icon=$GRADE_ICON"
          echo "total-issues=$TOTAL_ISSUES"
          echo "fixable-issues=$FIXABLE"
          echo "pass=$PASS"
          echo "exit-code=$EXIT_CODE"
        } >> "$GITHUB_OUTPUT"

        # build comment body
        DELIMITER=$(openssl rand -hex 16)
        {
          echo "comment<<$DELIMITER"
          echo "## $GRADE_ICON vet — Grade: **$GRADE** ($SCORE/100)"
          echo ""
          echo "| Category | Weight | Score | Issues |"
          echo "|----------|--------|-------|--------|"
          echo "$CATEGORY_TABLE"
          echo ""
          echo "**Total issues:** $TOTAL_ISSUES · **Fixable:** $FIXABLE · **Threshold:** $VET_THRESHOLD"

          if [ -n "$TOP_ISSUES" ]; then
            echo ""
            echo "<details><summary>Top issues</summary>"
            echo ""
            echo "| Severity | Location | Message |"
            echo "|----------|----------|---------|"
            echo "$TOP_ISSUES"
            echo ""
            echo "</details>"
          fi

          echo ""
          if [ "$PASS" = "true" ]; then
            echo "✅ Score **$SCORE** meets threshold **$VET_THRESHOLD**"
          else
            echo "❌ Score **$SCORE** is below threshold **$VET_THRESHOLD**"
          fi
          echo ""
          echo "*Generated by [vet](https://github.com/safetnsr/vet) — AI code health scanner*"
          echo "$DELIMITER"
        } >> "$GITHUB_OUTPUT"

    - name: Find existing comment
      if: github.event_name == 'pull_request'
      id: find-comment
      uses: peter-evans/find-comment@v3
      with:
        issue-number: ${{ github.event.pull_request.number }}
        comment-author: 'github-actions[bot]'
        body-includes: 'vet — Grade:'

    - name: Post or update PR comment
      if: github.event_name == 'pull_request'
      uses: peter-evans/create-or-update-comment@v4
      with:
        comment-id: ${{ steps.find-comment.outputs.comment-id }}
        issue-number: ${{ github.event.pull_request.number }}
        body: ${{ steps.vet.outputs.comment }}
        edit-mode: replace

    - name: Fail if below threshold
      if: steps.vet.outputs.pass == 'false'
      shell: bash
      run: |
        echo "::error::vet score ${{ steps.vet.outputs.score }} is below threshold ${{ inputs.threshold }}"
        exit 1
