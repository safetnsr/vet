name: 'vet — AI Code Health Check'
description: 'Run @safetnsr/vet on your PR and post a score card as a comment'
author: 'safetnsr'

branding:
  icon: 'shield'
  color: 'purple'

inputs:
  threshold:
    description: 'Minimum grade to pass (A, B, C, D, F). Default: C'
    required: false
    default: 'C'
  working-directory:
    description: 'Directory to run vet in. Default: .'
    required: false
    default: '.'
  version:
    description: 'Version of @safetnsr/vet to use. Default: latest'
    required: false
    default: 'latest'
  comment:
    description: 'Post results as PR comment (true/false). Default: true'
    required: false
    default: 'true'

outputs:
  score:
    description: 'Numeric score (0-100)'
  grade:
    description: 'Letter grade (A-F)'
  passed:
    description: 'Whether the threshold was met (true/false)'

runs:
  using: 'composite'
  steps:
    - name: Run vet
      id: vet
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        npx @safetnsr/vet@${{ inputs.version }} --json > /tmp/vet-result.json 2>&1 || true

        SCORE=$(jq -r '.score // 0' /tmp/vet-result.json)
        GRADE=$(jq -r '.grade // "F"' /tmp/vet-result.json)
        FIXABLE=$(jq -r '.fixableIssues // 0' /tmp/vet-result.json)

        echo "score=$SCORE" >> "$GITHUB_OUTPUT"
        echo "grade=$GRADE" >> "$GITHUB_OUTPUT"

        # Check threshold
        declare -A GRADE_ORDER=([A]=5 [B]=4 [C]=3 [D]=2 [F]=1)
        THRESHOLD="${{ inputs.threshold }}"
        if [[ ${GRADE_ORDER[$GRADE]:-0} -ge ${GRADE_ORDER[$THRESHOLD]:-3} ]]; then
          echo "passed=true" >> "$GITHUB_OUTPUT"
        else
          echo "passed=false" >> "$GITHUB_OUTPUT"
        fi

        # Build category table rows
        # Structure: .categories[].checks[].issues[]
        CATEGORIES=$(jq -r '
          .categories // [] | map(
            (.checks // [] | map(.issues // [] | length) | add // 0) as $issues |
            "| \(.name) | \(.score) | \(.weight) | \($issues) |"
          ) | join("\n")
        ' /tmp/vet-result.json)

        # Top 5 issues across all categories
        TOP_ISSUES=$(jq -r '
          [.categories // [] | .[].checks[]? | .issues[]? |
           select(.severity == "error" or .severity == "warning")] |
          sort_by(if .severity == "error" then 0 else 1 end) |
          .[0:5] |
          map("- **\(.severity):** \(.message) (`\(.file // "—"):\(.line // "")`)")  |
          join("\n")
        ' /tmp/vet-result.json)

        # Total issue count
        TOTAL_ISSUES=$(jq -r '
          [.categories // [] | .[].checks[]? | .issues[]? ] | length
        ' /tmp/vet-result.json)

        # Write comment to file to avoid escaping issues with GITHUB_OUTPUT heredoc
        {
          echo "## 🩺 vet score card"
          echo ""
          echo "**Score:** ${SCORE}/100 · **Grade:** ${GRADE} · **Threshold:** ${THRESHOLD}"
          echo "**Issues:** ${TOTAL_ISSUES} · **Fixable:** ${FIXABLE}"
          echo ""
          if [[ ${GRADE_ORDER[$GRADE]:-0} -ge ${GRADE_ORDER[$THRESHOLD]:-3} ]]; then
            echo "✅ **Passed**"
          else
            echo "❌ **Failed** — grade ${GRADE} is below threshold ${THRESHOLD}"
          fi
          echo ""
          echo "| Category | Score | Weight | Issues |"
          echo "|----------|-------|--------|--------|"
          echo "${CATEGORIES}"
          echo ""
          if [[ -n "${TOP_ISSUES}" && "${TOP_ISSUES}" != "null" && "${TOP_ISSUES}" != "" ]]; then
            echo "<details><summary>Top issues</summary>"
            echo ""
            echo "${TOP_ISSUES}"
            echo ""
            echo "</details>"
          fi
          echo ""
          echo "<sub>Posted by <a href=\"https://www.npmjs.com/package/@safetnsr/vet\">@safetnsr/vet</a></sub>"
        } > /tmp/vet-comment.md

    - name: Comment on PR
      if: inputs.comment == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        PR_NUMBER=${{ github.event.pull_request.number }}

        # Delete previous vet comment if exists
        EXISTING=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
          --jq '.[] | select(.body | contains("vet score card")) | .id' | head -1)

        if [[ -n "$EXISTING" ]]; then
          gh api -X DELETE "repos/${{ github.repository }}/issues/comments/${EXISTING}"
        fi

        gh pr comment "${PR_NUMBER}" --body-file /tmp/vet-comment.md

    - name: Fail if below threshold
      if: steps.vet.outputs.passed == 'false'
      shell: bash
      run: |
        echo "::error::vet grade ${{ steps.vet.outputs.grade }} is below threshold ${{ inputs.threshold }}"
        exit 1
